<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SORRY SHWETA ❤️</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Arial', sans-serif;
      overflow-x: hidden;
      background:
        linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
        url('1000147459.jpg') center/cover fixed;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      color: #ff69b4;
      font-size: 20px;
      animation: float 6s infinite linear;
      pointer-events: none;
    }
    @keyframes float {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-100px) rotate(360deg);
        opacity: 0;
      }
    }

    .container {
      text-align: center;
      max-width: 500px;
      padding: 40px;
      background: rgba(255,255,255,0.95);
      border-radius: 25px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      position: relative;
      animation: fadeInUp 1s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .typing-text {
      font-size: 3.5rem;
      font-weight: bold;
      background: linear-gradient(45deg, #d81b60, #f06292, #e91e63);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      border-right: 3px solid #d81b60;
      /* SLOWED DOWN TYPING - Changed from 3s to 6s and 150ms to 250ms */
      animation: typing 6s steps(50) infinite, blink 0.7s infinite;
      overflow: hidden;
      white-space: nowrap;
    }

    @keyframes typing {
      0%, 90%, 100% {
        width: 0;
      }
      50%, 80% {
        width: 100%;
      }
    }

    @keyframes blink {
      0%, 50% {
        border-color: transparent;
      }
      51%, 100% {
        border-color: #d81b60;
      }
    }

    .message {
      font-size: 1.2rem;
      line-height: 1.6;
      margin-bottom: 25px;
      color: #333;
      animation: fadeIn 4s ease-in; /* SLOWED DOWN from 2s to 4s */
      opacity: 0;
      animation-fill-mode: forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 15px 35px;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      position: relative;
      overflow: hidden;
      text-decoration: none;
      color: white;
      min-width: 180px;
    }

    .btn.yes {
      background: linear-gradient(45deg, #4caf50, #66bb6a);
      box-shadow: 0 8px 25px rgba(76, 175, 80, 0.4);
    }

    .btn.no {
      background: linear-gradient(45deg, #f44336, #ef5350);
      box-shadow: 0 8px 25px rgba(244, 67, 54, 0.4);
    }

    .btn:hover {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    }

    .btn:active {
      transform: translateY(-4px) scale(1.02);
    }

    /* Particle effect */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
    }

    .particle {
      position: absolute;
      background: #ff69b4;
      border-radius: 50%;
      pointer-events: none;
      animation: particleFloat 3s ease-out forwards;
    }

    @keyframes particleFloat {
      0% {
        transform: translateY(0) scale(0);
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) scale(1);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="typing-text" id="typingText">SORRY SHWETA</div>

    <div class="message">
      Shweta, every moment without your smile feels empty. 
      <br>I'm so sorry for hurting you. You mean the world to me.
      <br>I promise to cherish you and never let you down again.
    </div>

    <div class="buttons">
      <a href="yes.html" class="btn yes" onclick="createParticles(event)">Yes, I forgive you 💕</a>
      <a href="no.html" class="btn no" onclick="createParticles(event)">Not yet 😔</a>
    </div>
  </div>

  <script>
    // Floating hearts
    function createHeart() {
      const heart = document.createElement('div');
      heart.innerHTML = '💖';
      heart.className = 'heart';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }

    setInterval(createHeart, 2000);

    // SLOW TYPING ANIMATION - Changed speed from 150ms to 250ms per character
    const text = 'SORRY SHWETA';
    let i = 0;
    const typingElement = document.getElementById('typingText');

    function typeWriter() {
      if (i < text.length) {
        typingElement.textContent = text.slice(0, i + 1);
        i++;
        // SLOWER SPEED: 250ms per character (was 150ms)
        setTimeout(typeWriter, 250);
      }
    }
    typeWriter();

    // Trigger message fade-in after typing completes
    setTimeout(() => {
      document.querySelector('.message').style.animationPlayState = 'running';
    }, 2500);

    // Particle explosion
    function createParticles(e) {
      const particlesContainer = document.getElementById('particles');
      const rect = e.target.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top + rect.height / 2;

      for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        particle.style.width = particle.style.height = Math.random() * 8 + 4 + 'px';
        particle.style.background = ['#ff69b4', '#e91e63', '#f06292'][Math.floor(Math.random() * 3)];
        particlesContainer.appendChild(particle);

        setTimeout(() => particle.remove(), 3000);
      }
    }
  </script>
</body>
</html>
