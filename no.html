
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I'll Wait ❤️</title>
  <style>
    body { 
      margin: 0; 
      height: 100vh; 
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
    }
    .content {
      animation: fadeIn 1s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h1 { font-size: 3rem; margin-bottom: 20px; }
    p { font-size: 1.3rem; line-height: 1.6; margin-bottom: 30px; }
    a { 
      padding: 15px 30px; 
      background: rgba(255,255,255,0.2);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>I'll Wait For You ❤️</h1>
    <p>No matter how long it takes, 
    <br>I'll keep trying to win your heart back.</p>
    <a href="index.html">← Back</a>
  </div>
</body>
</html>
