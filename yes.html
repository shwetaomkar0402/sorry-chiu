    body { 
      margin: 0; 
      height: 100vh;

      align-items: center;
      font-family: Arial, sans-serif;

    p { font-size: 1.5rem; color: #333; }
    a { 
      display: inline-block; 
      margin-top: 30px; 
      padding: 15px 30px; 
      background: #e91e63; 
      color: white; 
      text-decoration: none; 
      border-radius: 50px;
      font-weight: bold;
    }
  </style>
